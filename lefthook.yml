pre-commit:
  parallel: true
  commands:
    build:
      run: bun run build
    lint:
      run: bun run lint
    test:
      run: bun run test

pre-push:
  commands:
    knip:
      run: bun run knip

commit-msg:
  commands:
    conventional-commit:
      run: bash scripts/check-commit-msg.sh {1}
